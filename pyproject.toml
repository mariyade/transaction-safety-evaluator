[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    "venv",
    "chroma_db",
    "evaluation_results",
    "logs",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]
ignore = [
    "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["agents", "tests"]
