[pytest]
markers =
    unit: marks fast, offline tests — no API calls, no network (default run)
    integration: marks tests that call the real OpenAI API (deselect with -m "not integration")
    guardrails: marks tests for runtime safety checks — prompt injection, PII, hallucination
    evaluation: marks tests that use DeepEval metrics (LLM-as-judge, costs API calls)
