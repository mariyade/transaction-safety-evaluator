name: Evaluation

on:
  workflow_dispatch:

jobs:
  # 1. Integration tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run integration tests
        run: |
          mkdir -p evaluation_results
          pytest -m integration \
            --json-report --json-report-file=evaluation_results/integration.json \
            -v --tb=short

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report-${{ github.run_id }}
          path: evaluation_results/integration.json

  # 2. End-to-end risk classification evaluation
  risk-classification:
    name: E2E Risk Classification Evaluation
    runs-on: ubuntu-latest
    needs: integration
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run E2E risk classification evaluation
        run: |
          mkdir -p evaluation_results
          pytest tests/transaction_safety/evaluation/e2e/test_risk_classification.py \
            --json-report --json-report-file=evaluation_results/risk_classification.json \
            -v --tb=short

      - name: Upload risk-classification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-classification-report-${{ github.run_id }}
          path: evaluation_results/risk_classification.json

  # 3. Component-level RAG evals
  rag-component:
    name: RAG Component Evals
    runs-on: ubuntu-latest
    needs: integration
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run RAG component evals
        run: |
          mkdir -p evaluation_results
          pytest tests/transaction_safety/evaluation/component/rag/test_rag_quality.py \
            --json-report --json-report-file=evaluation_results/rag_component.json \
            -v --tb=short

      - name: Upload RAG component report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-component-report-${{ github.run_id }}
          path: evaluation_results/rag_component.json

  # 4. DeepEval LLM-judge quality evals
  deepeval-quality:
    name: DeepEval Quality Evals
    runs-on: ubuntu-latest
    needs: integration
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run deepeval quality tests
        run: |
          deepeval test run \
            tests/transaction_safety/evaluation/e2e/test_final_answer_quality.py

      - name: Upload deepeval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-report-${{ github.run_id }}
          path: evaluation_results/
